kind: Agent
name: researcher
version: '2.0'
summary: Deep research specialist (web search, content extraction, synthesis)
cognitive_engine:
  primary:
    provider: deepseek
    model: deepseek-chat
    parameters:
      temperature: 0.4
      max_tokens: 4096
persona:
  agent: ./system-prompts/researcher.md
import:
  tools:
  - exec
  - fs_read
  - fs_write
  - grep
  - list
  - json
  - web_fetch
  - context_pin
  - context_peek
  - context_unpin
  - ./tools/web_search/tool.yml
  - ./tools/html_extract/tool.yml
