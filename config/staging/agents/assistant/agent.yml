kind: Agent
name: assistant
version: "2.0"
summary: "General-purpose assistant with file and shell access"

cognitive_engine:
  primary:
    provider: "openrouter"
    model: "nex-agi/nex-n2-pro:free"
    parameters:
      temperature: 0.7
      max_tokens: 4096

persona:
  agent: "./system-prompts/assistant.md"

# defaults: #default action modifiers, when the llm doesnt specify

# execution:
#   - rule:

import:
  tools:
    - "exec"
    - "fs_read"
    - "fs_write"
    - "grep"
    - "list"
    - "json"
    - "web_fetch"
    - "context_pin"
    - "context_peek"
    - "context_unpin"
