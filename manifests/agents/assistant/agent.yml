kind: Agent
name: assistant
version: '2.0'
summary: General-purpose assistant with file and shell access

cognitive_engine:
  primary:
    provider: openai-codex
    model: gpt-5.5
    parameters:
      temperature: 0.7
      max_tokens: 65536

persona:
  agent: ./system-prompts/assistant.md
import:
  tools:
  - exec
  - fs_read
  - fs_write
  - grep
  - list
  - json
  - web_fetch
  - context_pin
  - context_peek
  - context_unpin
  - ask_tool
  relics:
  - session_journal
  - state_checkpoint
  feeds: []
  env: []
  agent: [./architect/agent.yml]
