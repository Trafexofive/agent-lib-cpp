kind: Workflow
version: "1.0"
name: "code-review"
summary: "Review a source file for issues — grep for TODOs, count lines, check imports"

description: >
  Multi-step code review workflow. Takes a target file, discovers it,
  counts lines, searches for TODOs/FIXMEs/HACKs/XXXs, reads the source,
  and writes a review summary to /tmp/code-review-{target}.md.

steps:
  - id: discover
    type: tool
    name: "Discover the target"
    tool: list
    params:
      path: "."
      pattern: "${target}"
    on_error: abort

  - id: measure
    type: tool
    name: "Count lines"
    tool: exec
    params:
      command: "wc -l ${target}"
    on_error: skip

  - id: find_todos
    type: tool
    name: "Search for TODOs and FIXMEs"
    tool: grep
    params:
      pattern: "TODO|FIXME|HACK|XXX"
      path: "${target}"
    on_error: skip

  - id: read_source
    type: tool
    name: "Read the source file"
    tool: fs_read
    params:
      path: "${target}"
    on_error: abort

  - id: summarise
    type: tool
    name: "Write review summary"
    tool: fs_write
    params:
      path: "/tmp/code-review-${target_basename}.md"
      content: |
        # Code Review: ${target}
        
        **Lines**: ${measure.output}
        **TODOs**: ${find_todos.count} found
        **Source**: read above
        
        Review generated by MK3 workflow.
    on_error: skip

import:
  tools:
    - builtin/list
    - builtin/exec
    - builtin/grep
    - builtin/fs_read
    - builtin/fs_write

tags:
  - workflow
  - review
  - code-quality
