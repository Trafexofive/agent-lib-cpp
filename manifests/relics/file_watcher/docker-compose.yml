version: "3.8"
services:
  file_watcher:
    build: .
    container_name: relic_file_watcher
    ports:
      - "8014:8014"
    volumes:
      - watcher_data:/data
      - /tmp:/host_tmp
    environment:
      - SQLITE_DB_PATH=/data/watcher.db
      - MAX_EVENTS=5000
      - DEFAULT_DEBOUNCE_MS=500
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
volumes:
  watcher_data:
