kind: Tool
name: json
version: "2.0"
summary: "Parse, query, and transform JSON"
description: "JSON utility tool. Parses, validates, pretty-prints, minifies, and queries JSON data using dot notation."
category: data
tags: [json, parse, query, jq, transform]
input_schema:
  type: object
  properties:
    op:
      type: string
      enum: [parse, query, validate, pretty, minify]
      description: "Operation to perform"
      default: parse
    data:
      type: string
      description: "JSON string input"
    path:
      type: string
      description: "Dot query path for query op (e.g. users.0.name)"
    query:
      type: string
      description: "Legacy alias for path"
implementation:
  type: script
  runtime: python3
  entrypoint: json_tool.py
