kind: Tool
name: json
version: "2.0"
summary: "Parse, query, and transform JSON"
description: |
  JSON utility tool. Validates, pretty-prints, minifies, and queries
  JSON data using jq-style dot notation. Can read from a string or file.
category: data
tags: [json, parse, query, jq, transform]
input_schema:
  type: object
  properties:
    op:
      type: string
      enum: [parse, query, extract, validate, pretty, minify]
      description: "Operation to perform"
      default: parse
    data:
      type: string
      description: "JSON string input"
    path:
      type: string
      description: "Path to JSON file (alternative to data)"
    query:
      type: string
      description: "jq-style dot-notation query (e.g. '.users[0].name')"
    keys:
      type: array
      items:
        type: string
      description: "Keys to extract (for extract op)"
implementation:
  type: script
  runtime: python3
  entrypoint: json_tool.py
