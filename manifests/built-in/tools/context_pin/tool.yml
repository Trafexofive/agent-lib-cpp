kind: Tool
name: context_pin
version: "1.0"
summary: "Pin a file into persistent agent context"
category: context
tags: [context, pin, retain, memory]

description: "See input_schema for parameters"
  Reads a file and pins it into the agent's persistent context.
  The file content appears in EVERY future iteration until explicitly unpinned.
  Use for: configuration files, API schemas, reference docs, project structure.
  Overuse bloats context — pin only what the agent consistently needs.

input_schema:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: "File path to pin"

output_schema:
  type: object
  properties:
    success: { type: boolean }
    path: { type: string }
    size: { type: integer }
    mode: { type: string }

examples:
  - description: "Pin a project's config file"
    params:
      path: "config/agents/assistant/agent.yml"
