kind: Tool
name: web_search
version: "2.0"
summary: "Search the web for information"
description: |
  Performs a web search using multiple search engines and returns
  ranked results with titles, URLs, and snippets. Supports filtering
  by domain and result count.
category: web
tags: [search, web, internet, query]
input_schema:
  type: object
  required: [query]
  properties:
    query:
      type: string
      description: "Search query string"
    num_results:
      type: integer
      description: "Number of results to return"
      default: 10
    domains:
      type: string
      description: "Comma-separated domain filters (e.g., 'wikipedia.org,arxiv.org')"
output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        properties:
          title: { type: string }
          url: { type: string }
          snippet: { type: string }
    count: { type: integer }
examples:
  - description: "Search for Rust async patterns"
    params:
      query: "Rust async await patterns best practices"
      num_results: 5
  - description: "Search academic sources"
    params:
      query: "transformer attention mechanism"
      domains: "arxiv.org,semantic scholar.org"

implementation:
  type: script
  entrypoint: web_search.py
  runtime: python3

timeout: 35
