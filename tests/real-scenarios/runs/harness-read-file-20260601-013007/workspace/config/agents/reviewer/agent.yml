kind: Agent
name: reviewer
version: '2.0'
summary: Code review and quality assurance specialist
cognitive_engine:
  primary:
    provider: deepseek
    model: deepseek-chat
    parameters:
      temperature: 0.4
      max_tokens: 4096
persona:
  agent: ./system-prompts/reviewer.md
import:
  tools:
  - exec
  - fs_read
  - fs_write
  - grep
  - list
  - json
  - web_fetch
  - context_pin
  - context_peek
  - context_unpin
  - ./tools/diff_analyze/tool.yml
