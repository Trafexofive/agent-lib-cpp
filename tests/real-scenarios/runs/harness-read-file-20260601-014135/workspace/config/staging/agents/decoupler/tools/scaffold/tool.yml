kind: Tool
name: scaffold
version: "1.0"
summary: "Decomposes user tasks into structured sub-task plans with dependency DAGs"

runtime: python3
entrypoint: ./src/main.py

input_schema:
  type: object
  required: [task]
  properties:
    task:
      type: string
      description: "The task to decompose"
    mode:
      type: string
      enum: [decompose, validate]
      default: decompose
      description: "decompose = generate plan, validate = check existing plan"

output_schema:
  type: object
  properties:
    success:
      type: boolean
    plan:
      type: array
      description: "Ordered sub-tasks with dependencies"
      items:
        type: object
        properties:
          id: { type: integer }
          agent: { type: string }
          task: { type: string }
          depends_on: { type: array, items: { type: integer } }
    valid:
      type: boolean
    warnings:
      type: array
      items: { type: string }

examples:
  - description: "Decompose a feature request"
    params:
      task: "Add user authentication with email/password and OAuth"
      mode: decompose
  - description: "Decompose a refactoring task"
    params:
      task: "Split the monolithic UserService into UserRepo, AuthService, and ProfileService"
      mode: decompose
