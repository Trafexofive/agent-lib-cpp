kind: Agent
name: builder
version: '2.0'
summary: Code implementation, build, and test specialist
cognitive_engine:
  primary:
    provider: deepseek
    model: deepseek-v4-pro
    parameters:
      temperature: 0.5
      max_tokens: 4096
persona:
  agent: ./system-prompts/builder.md
import:
  tools:
  - exec
  - fs_read
  - fs_write
  - grep
  - list
  - json
  - web_fetch
  - context_pin
  - context_peek
  - context_unpin
  - ./tools/build_run/tool.yml
  relics:
  - ./relics/build_cache/relic.yml
