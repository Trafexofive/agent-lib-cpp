kind: Agent
name: assistant
version: "2.0"
summary: "General-purpose assistant with file and shell access"

cognitive_engine:
  primary:
    provider: "deepseek"
    model: "deepseek-chat"
    parameters:
      temperature: 0.7
      max_tokens: 4096

persona:
  agent: "./system-prompts/assistant.md"

import:
  tools:
    - "exec"
    - "fs_read"
    - "fs_write"
    - "grep"
    - "list"
    - "json"
    - "web_fetch"
    - "context_pin"
    - "context_peek"
    - "context_unpin"
    - "ask_tool"
