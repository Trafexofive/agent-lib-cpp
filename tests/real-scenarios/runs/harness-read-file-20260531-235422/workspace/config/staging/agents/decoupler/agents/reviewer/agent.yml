kind: Agent
name: reviewer
version: "1.0"
summary: "Validates plans and code — checks completeness, dependencies, and structural integrity"

cognitive_engine:
  primary:
    provider: deepseek
    model: deepseek-chat
    parameters:
      temperature: 0.3
      max_tokens: 2048

persona:
  agent: ./system-prompts/reviewer.md

import:
  tools:
    - ./tools/diff-analyze/tool.yml
