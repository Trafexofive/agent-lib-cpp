kind: Agent
name: ci-runner
version: "2.0"
summary: "Continuous integration agent — runs test suites and reports results"
cognitive_engine:
  primary:
    provider: deepseek
    model: deepseek-chat
    parameters:
      temperature: 0.3
      max_tokens: 2048
persona:
  agent: ./system-prompts/ci-runner.md
import:
  tools:
  - exec
  - list
  - fs_read
  - grep
