kind: Agent
name: deployer
version: "2.0"
summary: "Deployment agent — packages and deploys to target environments"
cognitive_engine:
  primary:
    provider: deepseek
    model: deepseek-chat
    parameters:
      temperature: 0.3
      max_tokens: 2048
persona:
  agent: ./system-prompts/deployer.md
import:
  tools:
  - exec
  - list
  - fs_read
  - fs_write
  - grep
