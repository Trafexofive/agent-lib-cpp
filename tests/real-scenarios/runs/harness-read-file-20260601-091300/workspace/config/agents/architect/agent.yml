kind: Agent
name: architect
version: '2.0'
summary: Project architecture and scaffolding specialist
cognitive_engine:
  primary:
    provider: zen
    model: zai-org/GLM-5.1-FP8
    parameters:
      temperature: 0.5
      max_tokens: 4096
persona:
  agent: ./system-prompts/architect.md
import:
  tools:
  - exec
  - fs_read
  - fs_write
  - grep
  - list
  - json
  - web_fetch
  - context_pin
  - context_peek
  - context_unpin
  - ./tools/scaffold/tool.yml
