kind: Feed
name: plan_progress
version: "1.0"
summary: "Tracks decomposition plan execution progress — pending, active, done, blocked counts"
runtime: bash
entrypoint: ./src/poller/poll.sh
interval_secs: 30
output_schema:
  type: object
  properties:
    pending: { type: integer }
    active: { type: integer }
    done: { type: integer }
    blocked: { type: integer }
    total: { type: integer }
    progress_pct: { type: integer }
