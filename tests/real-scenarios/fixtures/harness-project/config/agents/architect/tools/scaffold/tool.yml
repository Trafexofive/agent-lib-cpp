kind: Tool
name: scaffold
version: "2.0"
summary: "Generate project scaffolding from templates"
description: |
  Creates project structures, boilerplate files, and skeleton code.
  Supports C++ projects, Python packages, and custom templates.
category: codegen
tags: [scaffold, generate, template, boilerplate, structure]
input_schema:
  type: object
  required: [type]
  properties:
    type:
      type: string
      description: "Type of scaffold: cpp_class, python_module, manifest_tool, manifest_agent, project"
    name:
      type: string
      description: "Name for the new component"
    path:
      type: string
      description: "Target directory (defaults to current)"
    options:
      type: string
      description: "Additional options as JSON (type-specific)"
output_schema:
  type: object
  properties:
    created: { type: array }
    summary: { type: string }
examples:
  - description: "Scaffold a C++ class"
    params:
      type: "cpp_class"
      name: "TokenBuffer"
      path: "src/utils"
  - description: "Scaffold a manifest tool"
    params:
      type: "manifest_tool"
      name: "csv_parse"
      options: '{"runtime": "python3"}'

implementation:
  type: script
  entrypoint: scaffold.py
  runtime: python3

timeout: 15
