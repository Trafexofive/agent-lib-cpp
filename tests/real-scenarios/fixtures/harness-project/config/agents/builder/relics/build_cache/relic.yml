kind: Relic
name: build_cache
version: "1.0"
summary: "Persistent build artifact cache"

description: |
  Stores build artifacts (compiled objects, cached binaries) keyed by
  source hash. Avoids recompilation when source hasn't changed.
  Used by the builder agent to speed up iterative development.
service_type: "cache"

interface:
  type: "rest_api"
  base_url: "${BUILD_CACHE_URL:-http://localhost:8005}"
  endpoints:
    - name: "put_artifact"
      method: "POST"
      path: "/put"
      parameters:
        key:
          type: "string"
          required: true
        artifact_path:
          type: "string"
          required: true
    - name: "get_artifact"
      method: "GET"
      path: "/get/{key}"
      parameters:
        key:
          type: "string"
          required: true
    - name: "invalidate"
      method: "DELETE"
      path: "/invalidate/{key}"

health_check:
  type: "api_request"
  endpoint: "/health"
  method: "GET"
  expected_status: 200

deployment:
  type: "docker"
  docker_compose_file: "./docker-compose.yml"
