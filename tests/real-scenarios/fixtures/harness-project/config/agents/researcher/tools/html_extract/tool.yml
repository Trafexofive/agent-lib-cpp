kind: Tool
name: html_extract
version: "2.0"
summary: "Extract readable content from a web page"
description: |
  Fetches a URL and extracts the main readable content, stripping
  navigation, ads, and boilerplate. Returns clean text with metadata.
category: web
tags: [html, extract, scrape, parse, web, content]
input_schema:
  type: object
  required: [url]
  properties:
    url:
      type: string
      description: "URL to fetch and extract content from"
    selector:
      type: string
      description: "CSS selector to target specific content (default: auto-detect main content)"
    max_length:
      type: integer
      description: "Maximum characters to return"
      default: 10000
output_schema:
  type: object
  properties:
    title: { type: string }
    content: { type: string }
    url: { type: string }
    length: { type: integer }
examples:
  - description: "Extract article content"
    params:
      url: "https://example.com/article"
  - description: "Extract specific section"
    params:
      url: "https://docs.rs/tokio"
      selector: "main"
      max_length: 5000

implementation:
  type: script
  entrypoint: html_extract.py
  runtime: python3

timeout: 30
