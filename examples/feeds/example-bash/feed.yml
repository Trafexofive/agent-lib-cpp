kind: Feed
name: example_bash
version: "1.0"
summary: "Example feed demonstrating Bash runtime — reports system load and disk usage"

runtime: bash

entrypoint: ./feed.sh

interval_secs: 60

output_schema:
  type: object
  properties:
    load_1m:
      type: number
      description: "1-minute load average"
    load_5m:
      type: number
      description: "5-minute load average"
    disk_used_pct:
      type: integer
      description: "Root filesystem usage percentage"
    timestamp:
      type: string
      description: "When the feed was polled"
